<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>오늘 점심 레이스</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1e2428;
      --muted: #68737d;
      --line: #d7dee4;
      --track: #f4f7f9;
      --accent: #ef4f35;
      --accent-dark: #c43e28;
      --green: #1f9d68;
      --blue: #2878d4;
      --yellow: #f5b942;
      --panel: #ffffff;
      --shadow: 0 18px 45px rgba(27, 39, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(239, 79, 53, 0.08), transparent 36%),
        linear-gradient(300deg, rgba(31, 157, 104, 0.10), transparent 38%),
        #fbfcfd;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 34px 0 44px;
    }

    .topbar {
      display: block;
      text-align: center;
      margin-bottom: 22px;
    }

    .topbar > div:first-child {
      text-align: center;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      color: white;
      background: var(--accent);
      box-shadow: 0 10px 20px rgba(239, 79, 53, 0.24);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      color: var(--ink);
      background: #e9eef2;
    }

    .secondary:hover {
      background: #dce4eb;
    }

    .race-shell {
      display: grid;
      grid-template-columns: 1fr 284px;
      gap: 18px;
      align-items: stretch;
    }

    .race-board,
    .result-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .race-board {
      position: relative;
      overflow: hidden;
      padding: 22px 24px 26px 18px;
      min-height: 612px;
      max-height: 690px;
      overflow-y: auto;
    }

    .finish-line {
      position: absolute;
      top: 18px;
      bottom: 18px;
      right: 58px;
      width: 5px;
      border-radius: 99px;
      background: repeating-linear-gradient(
        to bottom,
        #1f252b 0 14px,
        #ffffff 14px 28px
      );
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
      z-index: 1;
    }

    .finish-label {
      position: absolute;
      top: 18px;
      right: 24px;
      z-index: 2;
      font-size: 28px;
      line-height: 1;
    }

    .lane {
      position: relative;
      display: grid;
      grid-template-columns: 96px 1fr;
      align-items: center;
      gap: 12px;
      height: 74px;
      margin-bottom: 13px;
      isolation: isolate;
    }

    .lane-name {
      min-width: 0;
      font-weight: 800;
      font-size: 16px;
      text-align: right;
      word-break: keep-all;
      line-height: 1.15;
    }

    .track {
      position: relative;
      height: 56px;
      border: 1px solid #dfe6ec;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent 60%),
        repeating-linear-gradient(90deg, transparent 0 31px, rgba(40, 120, 212, 0.08) 31px 32px),
        var(--track);
      overflow: hidden;
    }

    .runner {
      position: absolute;
      top: 50%;
      left: 0;
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 34px;
      transform: translate3d(0, -50%, 0);
      filter: drop-shadow(0 8px 8px rgba(27, 39, 51, 0.16));
      transition: transform 120ms linear;
      will-change: transform;
      z-index: 2;
    }

    .runner::after {
      content: "";
      position: absolute;
      inset: 7px 4px auto auto;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.65);
      pointer-events: none;
    }

    .lane.leading .track {
      border-color: rgba(239, 79, 53, 0.55);
      box-shadow: inset 0 0 0 2px rgba(239, 79, 53, 0.12);
    }

    .lane.leading .runner {
      animation: bounce 360ms ease-in-out infinite alternate;
    }

    .lane.winner .track {
      border-color: rgba(31, 157, 104, 0.8);
      background:
        repeating-linear-gradient(90deg, rgba(31, 157, 104, 0.12) 0 18px, transparent 18px 36px),
        #f4fbf7;
    }

    .lane.winner .runner {
      animation: winnerPop 700ms ease both;
    }

    @keyframes bounce {
      from {
        margin-top: -2px;
      }
      to {
        margin-top: 4px;
      }
    }

    @keyframes winnerPop {
      0% {
        scale: 1;
      }
      45% {
        scale: 1.34;
      }
      100% {
        scale: 1.12;
      }
    }

    .result-panel {
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 612px;
    }

    .result-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .winner-emoji {
      display: grid;
      place-items: center;
      width: 138px;
      height: 138px;
      margin: 14px auto 18px;
      border-radius: 50%;
      background: #fff4df;
      font-size: 74px;
      box-shadow: inset 0 0 0 1px rgba(245, 185, 66, 0.38);
    }

    .winner-name {
      margin: 0;
      font-size: 34px;
      line-height: 1.08;
      text-align: center;
      word-break: keep-all;
    }

    .winner-copy {
      min-height: 54px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
      text-align: center;
    }

    .stats {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #e5ebf0;
      color: var(--muted);
      font-size: 14px;
    }

    .stat strong {
      color: var(--ink);
      font-size: 17px;
    }

    .menu-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .result-actions {
      margin-top: 18px;
    }

    .result-actions button {
      flex: 1 1 118px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 32px;
      padding: 5px 9px;
      border: 1px solid #e1e8ee;
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      color: #3b454d;
    }

    .picker-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      padding: 12px;
    }

    .picker-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .picker-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
    }

    .picker-count {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }

    .picker-tools {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-input {
      width: 100%;
      min-height: 34px;
      border: 1px solid #d9e1e7;
      border-radius: 8px;
      padding: 0 10px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      background: #fbfcfd;
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(40, 120, 212, 0.7);
      box-shadow: 0 0 0 3px rgba(40, 120, 212, 0.12);
    }

    .tool-buttons,
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .small-button,
    .category-button {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid #dce4eb;
      background: #fff;
      color: #3c464e;
      font-size: 13px;
      box-shadow: none;
    }

    .small-button:hover,
    .category-button:hover,
    .category-button.active {
      border-color: rgba(239, 79, 53, 0.55);
      background: #fff4f1;
      color: var(--accent-dark);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 6px;
      max-height: 194px;
      overflow: auto;
      padding: 2px;
      margin-top: 8px;
    }

    .menu-option {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
      border: 1px solid #e1e8ee;
      border-radius: 8px;
      background: #fff;
      padding: 6px 8px;
      cursor: pointer;
      font-weight: 800;
      line-height: 1.1;
      user-select: none;
      transition: border 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .menu-option:hover {
      transform: translateY(-1px);
      border-color: rgba(40, 120, 212, 0.35);
      background: #f7fbff;
    }

    .menu-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .menu-option .emoji {
      font-size: 19px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .menu-option .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .menu-option:has(input:checked) {
      border-color: rgba(31, 157, 104, 0.72);
      background: #f0fbf5;
      box-shadow: inset 0 0 0 1px rgba(31, 157, 104, 0.18);
    }

    @media (max-width: 860px) {
      main {
        width: min(100vw - 22px, 680px);
        padding-top: 24px;
      }

      .topbar {
        display: block;
      }

      .topbar > div:first-child {
        text-align: center;
      }

      .actions {
        justify-content: stretch;
        margin-top: 18px;
      }

      button {
        flex: 1 1 150px;
      }

      .race-shell {
        grid-template-columns: 1fr;
      }

      .picker-head,
      .picker-tools {
        grid-template-columns: 1fr;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        max-height: 188px;
      }

      .race-board {
        min-height: auto;
        max-height: 560px;
        padding: 18px 16px 18px 10px;
      }

      .result-panel {
        min-height: auto;
      }

      .lane {
        grid-template-columns: 72px 1fr;
        gap: 8px;
        height: 64px;
        margin-bottom: 10px;
      }

      .lane-name {
        font-size: 13px;
      }

      .track {
        height: 48px;
      }

      .runner {
        width: 44px;
        height: 44px;
        font-size: 29px;
      }

      .finish-line {
        right: 42px;
      }

      .finish-label {
        right: 13px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="topbar" aria-label="점심 메뉴 레이스">
      <div>
        <h1>오늘 점심 레이스</h1>
        <p class="subtitle">식품 이모지가 결승선을 통과하면 오늘의 메뉴가 결정됩니다.</p>
      </div>
    </section>

    <section class="picker-panel" aria-label="참가 메뉴 선택">
      <div class="picker-head">
        <h2 class="picker-title">참가 메뉴 선택</h2>
        <div class="picker-count" id="selectedCount">0개 선택</div>
      </div>
      <div class="picker-tools">
        <input class="search-input" id="menuSearch" type="search" placeholder="메뉴 검색" autocomplete="off">
        <div class="tool-buttons">
          <button class="small-button" id="selectAllButton" type="button">전체 선택</button>
          <button class="small-button" id="clearButton" type="button">전체 해제</button>
          <button class="small-button" id="randomButton" type="button">랜덤 8개</button>
        </div>
      </div>
      <div class="category-tabs" id="categoryTabs" aria-label="메뉴 카테고리"></div>
      <div class="menu-grid" id="menuPicker"></div>
    </section>

    <section class="race-shell">
      <div class="race-board" id="raceBoard" aria-live="polite">
        <div class="finish-label" aria-hidden="true">🏁</div>
        <div class="finish-line" aria-hidden="true"></div>
      </div>

      <aside class="result-panel">
        <div>
          <p class="result-title">Winner</p>
          <div class="winner-emoji" id="winnerEmoji">🍽️</div>
          <h2 class="winner-name" id="winnerName">출발 대기</h2>
          <p class="winner-copy" id="winnerCopy">버튼을 누르면 메뉴들이 달리기 시작합니다.</p>
          <div class="stats">
            <div class="stat">
              <span>현재 선두</span>
              <strong id="leaderName">-</strong>
            </div>
            <div class="stat">
              <span>참가 메뉴</span>
              <strong id="menuCount">8개</strong>
            </div>
          </div>
        </div>
        <div class="menu-list" id="menuList" aria-label="참가 메뉴 목록"></div>
        <div class="actions result-actions">
          <button class="primary" id="startButton" type="button">레이스 시작</button>
          <button class="secondary" id="resetButton" type="button">다시 섞기</button>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const categories = ["전체", "한식", "면/국물", "일식", "중식", "서양식", "간편식", "가벼운식", "디저트"];
    const menus = [
      { id: "kimchi-jjigae", category: "한식", name: "김치찌개", emoji: "🍲", note: "뜨끈하고 든든한 한식 승자입니다." },
      { id: "doenjang-jjigae", category: "한식", name: "된장찌개", emoji: "🥘", note: "구수하게 속을 채우는 선택입니다." },
      { id: "bibimbap", category: "한식", name: "비빔밥", emoji: "🥘", note: "한 그릇에 균형 있게 담긴 선택입니다." },
      { id: "gimbap", category: "한식", name: "김밥", emoji: "🍙", note: "가볍고 빠르게 먹기 좋은 메뉴입니다." },
      { id: "tteokbokki", category: "한식", name: "떡볶이", emoji: "🌶️", note: "매콤한 점심이 필요한 날입니다." },
      { id: "samgyeopsal", category: "한식", name: "삼겹살", emoji: "🥓", note: "확실히 든든한 점심이 걸렸습니다." },
      { id: "galbi", category: "한식", name: "갈비", emoji: "🍖", note: "고기 기분이 강한 날의 우승 메뉴입니다." },
      { id: "fried-chicken-kr", category: "한식", name: "치킨", emoji: "🍗", note: "바삭한 점심으로 분위기를 바꿉니다." },
      { id: "soup-rice", category: "한식", name: "국밥", emoji: "🍲", note: "뜨끈하게 한 그릇 비우기 좋습니다." },
      { id: "curry-rice", category: "한식", name: "카레라이스", emoji: "🍛", note: "부담 없이 든든한 점심입니다." },
      { id: "omurice", category: "한식", name: "오므라이스", emoji: "🍳", note: "부드럽고 무난한 한 접시입니다." },
      { id: "rice-bowl", category: "한식", name: "덮밥", emoji: "🍚", note: "빠르고 안정적인 한 그릇 선택입니다." },
      { id: "sweet-potato", category: "가벼운식", name: "고구마", emoji: "🍠", note: "가볍게 버티고 싶은 날에 좋습니다." },
      { id: "ramen", category: "면/국물", name: "라멘", emoji: "🍜", note: "진한 국물과 면이 오늘의 답입니다." },
      { id: "pho", category: "면/국물", name: "쌀국수", emoji: "🍜", note: "국물과 향이 깔끔하게 들어옵니다." },
      { id: "udon", category: "면/국물", name: "우동", emoji: "🍜", note: "따뜻하고 부드러운 면 메뉴입니다." },
      { id: "soba", category: "면/국물", name: "소바", emoji: "🍜", note: "가볍게 후루룩 먹기 좋습니다." },
      { id: "pasta", category: "면/국물", name: "파스타", emoji: "🍝", note: "소스 있는 점심이 당첨됐습니다." },
      { id: "spaghetti", category: "면/국물", name: "스파게티", emoji: "🍝", note: "토마토든 크림이든 만족도가 좋습니다." },
      { id: "cold-noodle", category: "면/국물", name: "냉면", emoji: "🥣", note: "시원하게 식히는 점심입니다." },
      { id: "kal-guksu", category: "면/국물", name: "칼국수", emoji: "🍜", note: "든든한 국물 면이 승리했습니다." },
      { id: "jjamppong", category: "면/국물", name: "짬뽕", emoji: "🍜", note: "얼큰한 국물이 필요한 날입니다." },
      { id: "sushi", category: "일식", name: "초밥", emoji: "🍣", note: "가볍지만 기분 좋은 점심입니다." },
      { id: "bento", category: "일식", name: "도시락", emoji: "🍱", note: "깔끔하게 정리된 점심입니다." },
      { id: "tempura", category: "일식", name: "튀김", emoji: "🍤", note: "바삭한 식감이 우승했습니다." },
      { id: "onigiri", category: "일식", name: "주먹밥", emoji: "🍙", note: "간단하지만 든든한 선택입니다." },
      { id: "oden", category: "일식", name: "오뎅", emoji: "🍢", note: "따뜻한 국물과 꼬치가 좋습니다." },
      { id: "rice-cracker", category: "일식", name: "센베이", emoji: "🍘", note: "가벼운 간식형 점심입니다." },
      { id: "fish-cake", category: "일식", name: "어묵", emoji: "🍥", note: "국물 메뉴와 잘 어울리는 선택입니다." },
      { id: "dumpling", category: "중식", name: "만두", emoji: "🥟", note: "한입씩 먹기 좋은 메뉴가 걸렸습니다." },
      { id: "takeout-box", category: "중식", name: "중식 도시락", emoji: "🥡", note: "빠르게 먹기 좋은 중식 선택입니다." },
      { id: "fortune-cookie", category: "중식", name: "포춘쿠키", emoji: "🥠", note: "가볍게 운을 맡기는 메뉴입니다." },
      { id: "mapo-tofu", category: "중식", name: "마파두부", emoji: "🌶️", note: "매콤하고 든든한 밥 메뉴입니다." },
      { id: "fried-rice", category: "중식", name: "볶음밥", emoji: "🍚", note: "고소하고 빠른 점심입니다." },
      { id: "taco", category: "서양식", name: "타코", emoji: "🌮", note: "손에 들고 먹는 재미가 있습니다." },

      { id: "grapes", category: "디저트", name: "포도", emoji: "🍇", note: "상큼한 디저트형 메뉴입니다." },
      { id: "watermelon", category: "디저트", name: "수박", emoji: "🍉", note: "시원한 디저트가 우승했습니다." },
      { id: "strawberry", category: "디저트", name: "딸기", emoji: "🍓", note: "가볍고 상큼한 선택입니다." },
      { id: "blueberry", category: "디저트", name: "블루베리", emoji: "🫐", note: "작게 집어 먹기 좋은 메뉴입니다." },
      { id: "kiwi", category: "디저트", name: "키위", emoji: "🥝", note: "산뜻하게 기분을 바꿉니다." },
      { id: "mango", category: "디저트", name: "망고", emoji: "🥭", note: "달콤한 과일 메뉴입니다." },
      { id: "ice-cream", category: "디저트", name: "아이스크림", emoji: "🍦", note: "시원한 마무리가 필요합니다." },
      { id: "shaved-ice", category: "디저트", name: "빙수", emoji: "🍧", note: "더운 날 강한 후보입니다." },
      { id: "doughnut", category: "디저트", name: "도넛", emoji: "🍩", note: "달콤한 기분 전환 메뉴입니다." },
      { id: "cookie", category: "디저트", name: "쿠키", emoji: "🍪", note: "가볍게 달달한 선택입니다." },
      { id: "cake", category: "디저트", name: "케이크", emoji: "🍰", note: "오늘은 디저트가 주인공입니다." },
      { id: "cupcake", category: "디저트", name: "컵케이크", emoji: "🧁", note: "작지만 확실히 달콤합니다." },
      { id: "pie", category: "디저트", name: "파이", emoji: "🥧", note: "브런치와 디저트 사이의 선택입니다." },
      { id: "chocolate", category: "디저트", name: "초콜릿", emoji: "🍫", note: "당 충전이 필요한 날입니다." },
      { id: "pudding", category: "디저트", name: "푸딩", emoji: "🍮", note: "부드럽고 달콤한 메뉴입니다." }
    ];

    const defaultSelectedIds = new Set([
      "kimchi-jjigae",
      "bibimbap",
      "cutlet",
      "pho",
      "hamburger",
      "sushi",
      "pizza",
      "salad"
    ]);

    const board = document.querySelector("#raceBoard");
    const startButton = document.querySelector("#startButton");
    const resetButton = document.querySelector("#resetButton");
    const selectAllButton = document.querySelector("#selectAllButton");
    const clearButton = document.querySelector("#clearButton");
    const randomButton = document.querySelector("#randomButton");
    const menuSearch = document.querySelector("#menuSearch");
    const categoryTabs = document.querySelector("#categoryTabs");
    const menuPicker = document.querySelector("#menuPicker");
    const selectedCount = document.querySelector("#selectedCount");
    const winnerEmoji = document.querySelector("#winnerEmoji");
    const winnerName = document.querySelector("#winnerName");
    const winnerCopy = document.querySelector("#winnerCopy");
    const leaderName = document.querySelector("#leaderName");
    const menuCount = document.querySelector("#menuCount");
    const menuList = document.querySelector("#menuList");

    let lanes = [];
    let raceFrame = 0;
    let running = false;
    let activeCategories = new Set();
    let selectedIds = new Set(defaultSelectedIds);

    function selectedMenus() {
      return menus.filter((menu) => selectedIds.has(menu.id));
    }

    function filteredMenus() {
      const query = menuSearch.value.trim().toLowerCase();
      return menus.filter((menu) => {
        const categoryMatch = activeCategories.size === 0 || activeCategories.has(menu.category);
        const queryMatch = !query || `${menu.name} ${menu.category}`.toLowerCase().includes(query);
        return categoryMatch && queryMatch;
      });
    }

    function updateSelectedCount() {
      selectedCount.textContent = `${selectedIds.size}개 선택`;
      startButton.disabled = selectedIds.size === 0 || running;
    }

    function renderCategories() {
      categoryTabs.innerHTML = "";
      categories.forEach((category) => {
        const button = document.createElement("button");
        button.className = "category-button";
        button.type = "button";
        button.textContent = category;
        const isActive = category === "전체" ? activeCategories.size === 0 : activeCategories.has(category);
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
        button.addEventListener("click", () => {
          if (category === "전체") {
            activeCategories.clear();
          } else if (activeCategories.has(category)) {
            activeCategories.delete(category);
          } else {
            activeCategories.add(category);
          }
          renderCategories();
          renderPicker();
        });
        categoryTabs.append(button);
      });
    }

    function renderPicker() {
      menuPicker.innerHTML = "";

      filteredMenus().forEach((menu) => {
        const label = document.createElement("label");
        label.className = "menu-option";

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = selectedIds.has(menu.id);
        input.addEventListener("change", () => {
          if (input.checked) selectedIds.add(menu.id);
          else selectedIds.delete(menu.id);
          renderMenus();
          resetRace();
        });

        const emoji = document.createElement("span");
        emoji.className = "emoji";
        emoji.textContent = menu.emoji;

        const name = document.createElement("span");
        name.className = "name";
        name.textContent = menu.name;

        label.append(input, emoji, name);
        menuPicker.append(label);
      });
    }

    function createLane(menu, index) {
      const lane = document.createElement("div");
      lane.className = "lane";
      lane.dataset.index = String(index);

      const label = document.createElement("div");
      label.className = "lane-name";
      label.textContent = menu.name;

      const track = document.createElement("div");
      track.className = "track";

      const runner = document.createElement("div");
      runner.className = "runner";
      runner.textContent = menu.emoji;
      runner.setAttribute("aria-label", `${menu.name} 주자`);

      track.append(runner);
      lane.append(label, track);
      return { menu, lane, track, runner, progress: 0, speed: 0, finished: false };
    }

    function renderMenus() {
      board.querySelectorAll(".lane").forEach((lane) => lane.remove());
      menuList.innerHTML = "";
      lanes = selectedMenus().map(createLane);

      lanes.forEach((entry) => {
        board.append(entry.lane);
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = `${entry.menu.emoji} ${entry.menu.name}`;
        menuList.append(chip);
      });

      menuCount.textContent = `${lanes.length}개`;
      updateSelectedCount();
      updateRunnerPositions();
    }

    function updateRunnerPositions() {
      lanes.forEach((entry) => {
        const finishX = Math.max(0, entry.track.clientWidth - 70);
        const x = Math.min(entry.progress, 100) / 100 * finishX;
        entry.runner.style.transform = `translate3d(${x}px, -50%, 0)`;
      });
    }

    function setResult(menu) {
      winnerEmoji.textContent = menu.emoji;
      winnerName.textContent = menu.name;
      winnerCopy.textContent = menu.note;
    }

    function resetRace() {
      cancelAnimationFrame(raceFrame);
      running = false;
      startButton.disabled = false;
      startButton.textContent = "레이스 시작";
      winnerEmoji.textContent = "🍽️";
      winnerName.textContent = "출발 대기";
      winnerCopy.textContent = lanes.length ? "선택한 메뉴들이 결승선을 향해 달립니다." : "참가 메뉴를 선택해 주세요.";
      leaderName.textContent = "-";

      lanes.forEach((entry) => {
        entry.progress = 0;
        entry.speed = 0.42 + Math.random() * 0.38;
        entry.finished = false;
        entry.lane.classList.remove("leading", "winner");
      });

      updateRunnerPositions();
      updateSelectedCount();
    }

    function pickWinner() {
      return lanes[Math.floor(Math.random() * lanes.length)];
    }

    function startRace() {
      if (running || lanes.length === 0) return;

      resetRace();
      running = true;
      startButton.disabled = true;
      startButton.textContent = "달리는 중";

      const winner = pickWinner();
      const startTime = performance.now();
      const duration = 5200 + Math.random() * 1400;

      function tick(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const endBoost = t > 0.72 ? (t - 0.72) / 0.28 : 0;

        lanes.forEach((entry) => {
          const wobble = Math.sin((elapsed / 180) + entry.menu.name.length) * 0.28;
          const burst = Math.random() * (t < 0.8 ? 0.82 : 0.28);
          const winnerPull = entry === winner ? 0.25 + endBoost * 1.18 : 0;
          const slowdown = t > 0.85 && entry !== winner ? 0.34 : 1;

          entry.speed = Math.max(0.1, (0.44 + wobble + burst + winnerPull) * slowdown);
          entry.progress = Math.min(100, entry.progress + entry.speed);

          if (entry === winner && t > 0.88) {
            entry.progress = Math.max(entry.progress, 92 + endBoost * 10);
          }
        });

        const leader = lanes.reduce((best, entry) => entry.progress > best.progress ? entry : best, lanes[0]);
        lanes.forEach((entry) => entry.lane.classList.toggle("leading", entry === leader));
        leaderName.textContent = `${leader.menu.emoji} ${leader.menu.name}`;

        updateRunnerPositions();

        if (winner.progress >= 100 || t === 1) {
          finishRace(winner);
          return;
        }

        raceFrame = requestAnimationFrame(tick);
      }

      raceFrame = requestAnimationFrame(tick);
    }

    function finishRace(winner) {
      running = false;
      cancelAnimationFrame(raceFrame);

      lanes.forEach((entry) => {
        entry.lane.classList.remove("leading");
        entry.lane.classList.toggle("winner", entry === winner);
        if (entry === winner) entry.progress = 100;
        else entry.progress = Math.min(entry.progress, 92 + Math.random() * 4);
      });

      leaderName.textContent = `${winner.menu.emoji} ${winner.menu.name}`;
      setResult(winner.menu);
      updateRunnerPositions();

      startButton.disabled = false;
      startButton.textContent = "다시 달리기";
      updateSelectedCount();
    }

    function selectFilteredMenus() {
      filteredMenus().forEach((menu) => selectedIds.add(menu.id));
      renderPicker();
      renderMenus();
      resetRace();
    }

    function clearFilteredMenus() {
      filteredMenus().forEach((menu) => selectedIds.delete(menu.id));
      renderPicker();
      renderMenus();
      resetRace();
    }

    function selectRandomMenus() {
      const shuffled = [...menus].sort(() => Math.random() - 0.5);
      selectedIds = new Set(shuffled.slice(0, 8).map((menu) => menu.id));
      renderPicker();
      renderMenus();
      resetRace();
    }

    startButton.addEventListener("click", startRace);
    resetButton.addEventListener("click", resetRace);
    selectAllButton.addEventListener("click", selectFilteredMenus);
    clearButton.addEventListener("click", clearFilteredMenus);
    randomButton.addEventListener("click", selectRandomMenus);
    menuSearch.addEventListener("input", renderPicker);
    window.addEventListener("resize", updateRunnerPositions);

    renderCategories();
    renderPicker();
    renderMenus();
    resetRace();
  </script>
</body>
